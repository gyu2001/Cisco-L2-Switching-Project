! VTP Configuration
vtp mode client
vtp domain history.com
vtp password history
vtp version 2

! VLAN Assignment
interface e2/0
 switchport mode access
 switchport access vlan 12
interface e0/2
 switchport mode access
 switchport access vlan 21
interface e1/1
 switchport mode access
 switchport access vlan 23

! Trunk to R6 (Router-on-a-stick)
interface e1/2
 switchport trunk encapsulation dot1q
 switchport mode trunk
 switchport trunk allowed vlan 13,22

! EtherChannel
interface range e3/0-1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 12 mode on
interface range e3/2-3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 24 mode on
interface range e2/2-3
 shutdown
port-channel load-balance src-dst-ip

! MST
spanning-tree mode mst
spanning-tree mst configuration
 name HISTORY
 revision 1
 instance 1 vlan 11,21
 instance 2 vlan 100
 instance 3 vlan 12
spanning-tree mst 3 root primary

! SVI
interface vlan 100
 no shutdown
 ip address 14.14.90.2 255.255.255.0
