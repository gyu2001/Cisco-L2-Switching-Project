! VTP Configuration
vtp mode server
vtp domain history.com
vtp password history
vtp version 2

! VLAN Configuration
vlan 11
 name BB1
vlan 12
 name BB2
vlan 13
 name BB3
vlan 21
 name VLAN_A
vlan 22
 name VLAN_B
vlan 23
 name VLAN_C
vlan 50
 name VLAN_CUSTOMER1
vlan 79
 name VLAN_CUSTOMER2
vlan 100
 name VLAN_SWITCHS

interface e2/0
 switchport mode access
 switchport access vlan 11
interface e0/0
 switchport mode access
 switchport access vlan 11
interface e0/2
 switchport mode access
 switchport access vlan 22
interface e0/3
 no switchport
 ip address 14.14.33.7 255.255.255.0
interface e1/2
 no switchport
 ip address 14.14.36.7 255.255.255.0

! EtherChannel
interface range e3/0-1
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 12 mode on
interface range e3/2-3
 switchport trunk encapsulation dot1q
 switchport mode trunk
 channel-group 13 mode on
interface range e2/2-3
 shutdown
port-channel load-balance src-dst-ip

! MST (Multiple Spanning Tree)
spanning-tree mode mst
spanning-tree mst configuration
 name HISTORY
 revision 1
 instance 1 vlan 11,21
 instance 2 vlan 100
 instance 3 vlan 12
spanning-tree mst 1 root primary

! SVI
interface vlan 100
 no shutdown
 ip address 14.14.90.1 255.255.255.0
